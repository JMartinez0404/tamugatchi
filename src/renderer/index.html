<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tamugatchi</title>
  <link rel="stylesheet" href="pet.css">
</head>
<body>
  <div id="pet-container">
    <!-- Speech Bubble -->
    <div id="speech-bubble" class="hidden">
      <div id="bubble-text"></div>
      <div id="bubble-actions" class="hidden">
        <button id="btn-approve" class="btn-action btn-approve" title="Approve">&#10003;</button>
        <button id="btn-dismiss" class="btn-action btn-dismiss" title="Dismiss">&#10007;</button>
      </div>
    </div>

    <!-- Pet Character -->
    <div id="pet" class="pet-idle">
      <svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" id="pet-svg">
        <!-- Body -->
        <ellipse cx="60" cy="85" rx="45" ry="50" fill="#FFB6D9" class="pet-body"/>
        <ellipse cx="60" cy="85" rx="40" ry="45" fill="#FFC8E3" class="pet-body-inner"/>

        <!-- Ears -->
        <ellipse cx="28" cy="42" rx="12" ry="18" fill="#FFB6D9" transform="rotate(-15 28 42)" class="pet-ear-left"/>
        <ellipse cx="92" cy="42" rx="12" ry="18" fill="#FFB6D9" transform="rotate(15 92 42)" class="pet-ear-right"/>
        <ellipse cx="28" cy="42" rx="8" ry="12" fill="#FF9EC5" transform="rotate(-15 28 42)"/>
        <ellipse cx="92" cy="42" rx="8" ry="12" fill="#FF9EC5" transform="rotate(15 92 42)"/>

        <!-- Eyes -->
        <g id="eyes-normal">
          <ellipse cx="42" cy="75" rx="8" ry="9" fill="#3D3D3D" class="eye-left"/>
          <ellipse cx="78" cy="75" rx="8" ry="9" fill="#3D3D3D" class="eye-right"/>
          <ellipse cx="44" cy="72" rx="3" ry="3" fill="white" class="eye-shine-left"/>
          <ellipse cx="80" cy="72" rx="3" ry="3" fill="white" class="eye-shine-right"/>
        </g>

        <!-- Sparkle Eyes (for excited state) -->
        <g id="eyes-sparkle" class="hidden">
          <text x="32" y="82" font-size="20" fill="#FFD700">&#10022;</text>
          <text x="68" y="82" font-size="20" fill="#FFD700">&#10022;</text>
        </g>

        <!-- Closed Eyes (for sleeping) -->
        <g id="eyes-closed" class="hidden">
          <path d="M34 75 Q42 70 50 75" stroke="#3D3D3D" stroke-width="2.5" fill="none"/>
          <path d="M70 75 Q78 70 86 75" stroke="#3D3D3D" stroke-width="2.5" fill="none"/>
        </g>

        <!-- Swirl Eyes (for thinking) -->
        <g id="eyes-swirl" class="hidden">
          <circle cx="42" cy="75" r="8" fill="none" stroke="#3D3D3D" stroke-width="2"/>
          <circle cx="42" cy="75" r="4" fill="none" stroke="#3D3D3D" stroke-width="1.5"/>
          <circle cx="78" cy="75" r="8" fill="none" stroke="#3D3D3D" stroke-width="2"/>
          <circle cx="78" cy="75" r="4" fill="none" stroke="#3D3D3D" stroke-width="1.5"/>
        </g>

        <!-- Blush -->
        <ellipse cx="30" cy="88" rx="8" ry="5" fill="#FF9EC5" opacity="0.5" class="blush-left"/>
        <ellipse cx="90" cy="88" rx="8" ry="5" fill="#FF9EC5" opacity="0.5" class="blush-right"/>

        <!-- Mouth -->
        <g id="mouth-smile">
          <path d="M50 95 Q60 105 70 95" stroke="#3D3D3D" stroke-width="2" fill="none"/>
        </g>
        <g id="mouth-open" class="hidden">
          <ellipse cx="60" cy="98" rx="6" ry="5" fill="#FF6B9D"/>
        </g>
        <g id="mouth-sad" class="hidden">
          <path d="M48 100 Q60 93 72 100" stroke="#3D3D3D" stroke-width="2" fill="none"/>
        </g>

        <!-- Arms -->
        <ellipse cx="18" cy="95" rx="8" ry="14" fill="#FFB6D9" transform="rotate(15 18 95)" class="arm-left"/>
        <ellipse cx="102" cy="95" rx="8" ry="14" fill="#FFB6D9" transform="rotate(-15 102 95)" class="arm-right"/>

        <!-- Feet -->
        <ellipse cx="42" cy="130" rx="14" ry="8" fill="#FFB6D9" class="foot-left"/>
        <ellipse cx="78" cy="130" rx="14" ry="8" fill="#FFB6D9" class="foot-right"/>

        <!-- Zzz (for sleeping) -->
        <g id="zzz" class="hidden">
          <text x="85" y="45" font-size="14" fill="#9999CC" opacity="0.8">z</text>
          <text x="95" y="32" font-size="18" fill="#9999CC" opacity="0.6">z</text>
          <text x="105" y="18" font-size="22" fill="#9999CC" opacity="0.4">Z</text>
        </g>

        <!-- Hearts (for happy) -->
        <g id="hearts" class="hidden">
          <text x="10" y="50" font-size="14" fill="#FF6B9D">&#9829;</text>
          <text x="95" y="45" font-size="12" fill="#FF6B9D">&#9829;</text>
          <text x="55" y="35" font-size="10" fill="#FF6B9D">&#9829;</text>
        </g>

        <!-- Thinking dots -->
        <g id="thinking-dots" class="hidden">
          <circle cx="90" cy="55" r="3" fill="#CCCCCC"/>
          <circle cx="100" cy="45" r="4" fill="#CCCCCC"/>
          <circle cx="112" cy="33" r="5" fill="#CCCCCC"/>
        </g>
      </svg>
    </div>

    <!-- Pet Name -->
    <div id="pet-name"></div>
  </div>

  <script src="pet.js"></script>
  <script src="notification.js"></script>
</body>
</html>
